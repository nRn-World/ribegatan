<!DOCTYPE html>
<html>
<head>
    <title>Test Search</title>
    <style>
        .search-results { border: 1px solid #ccc; margin-top: 10px; }
        .search-result-item { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; }
        .search-result-item:hover { background: #f0f0f0; }
    </style>
</head>
<body>
    <h1>Test Search Function</h1>
    <input type="text" id="searchInput" placeholder="Sök...">
    <div id="searchResults" class="search-results"></div>

    <section id="tvattstuga">
        <h2>Tvättstugor & träfflokaler</h2>
        <p>Information om tvättstugor</p>
    </section>

    <section id="styrelsen">
        <h2>Styrelsen</h2>
        <p>Information om styrelsen</p>
    </section>

    <script>
        const searchInput = document.getElementById('searchInput');
        const searchResults = document.getElementById('searchResults');

        console.log('Elements found:', { searchInput, searchResults });

        function buildSearchIndex() {
            const sections = document.querySelectorAll('section');
            const searchIndex = [];

            sections.forEach(section => {
                const sectionId = section.id;
                const heading = section.querySelector('h2, h3, h1');
                const paragraphs = section.querySelectorAll('p');

                if (heading) {
                    const title = heading.textContent.trim();
                    const content = Array.from(paragraphs)
                        .map(p => p.textContent.trim())
                        .join(' ');

                    searchIndex.push({
                        id: sectionId,
                        title: title,
                        content: content
                    });
                }
            });

            console.log('Search index:', searchIndex);
            return searchIndex;
        }

        const searchIndex = buildSearchIndex();

        function performSearch(query) {
            console.log('Searching for:', query);
            
            if (!query || query.length < 2) {
                searchResults.innerHTML = '';
                return;
            }

            const lowerQuery = query.toLowerCase();
            const results = searchIndex.filter(item => {
                return item.title.toLowerCase().includes(lowerQuery) ||
                    item.content.toLowerCase().includes(lowerQuery);
            });

            console.log('Results found:', results);
            displayResults(results);
        }

        function displayResults(results) {
            searchResults.innerHTML = '';

            if (results.length === 0) {
                searchResults.innerHTML = '<div>Inga resultat</div>';
                return;
            }

            results.forEach(result => {
                const div = document.createElement('div');
                div.className = 'search-result-item';
                div.innerHTML = `<strong>${result.title}</strong><br>${result.content}`;
                searchResults.appendChild(div);
            });
        }

        searchInput.addEventListener('input', (e) => {
            console.log('Input event:', e.target.value);
            performSearch(e.target.value);
        });

        console.log('Event listener attached');
    </script>
</body>
</html>
